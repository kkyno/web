<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长征绘途 - 序幕：瑞金出发</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #0b0b0f;
            color: #e2dcd0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            width: 960px;
            height: 540px;
            border: 6px solid #2d2d38;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            background-color: #101014;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #viewport {
            position: relative;
            width: 100%;
            height: 420px;
            overflow: hidden;
            background-color: #0d0d11;
            cursor: grab;
        }
        #viewport:active { cursor: grabbing; }

        #main-canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #narrative-bar {
            flex: 1;
            background-color: #161622;
            border-top: 4px solid #2d2d38;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #dialogue-text {
            font-size: 15px;
            line-height: 1.6;
            color: #c2b9a7;
            max-width: 75%;
            white-space: pre-line;
        }

        .pixel-btn {
            background-color: #a33835;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: -3px 0 0 #5a1e1c, 3px 0 0 #5a1e1c, 0 -3px 0 #5a1e1c, 0 3px 0 #5a1e1c;
            transition: background 0.1s;
        }
        .pixel-btn:hover { background-color: #bc4340; }
        .pixel-btn:active { transform: translate(1px, 1px); }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .pixel-modal {
            background-color: #22222e;
            border: 4px solid #4d4d66;
            padding: 24px;
            width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .modal-title {
            color: #e6a15c;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .modal-desc {
            font-size: 14px;
            color: #c2b9a7;
            line-height: 1.5;
            margin-top: 15px;
            text-align: center;
        }

        .object-preview-slot {
            width: 120px;
            height: 120px;
            border: 2px dashed #4d4d66;
            background-color: #181824;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .object-preview-slot img {
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
        }

        .paint-box {
            width: 192px;
            height: 192px;
            border: 4px solid #e6a15c;
            background-color: #14141a;
        }
        #paint-canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
            image-rendering: pixelated;
        }

        .palette {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .color-dot {
            width: 28px;
            height: 28px;
            border: 2px solid #3a3a4a;
            cursor: pointer;
            border-radius: 4px;
        }
        .color-dot.active {
            border-color: #fff;
            transform: scale(1.1);
        }

        .close-x {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #8a8a9a;
            cursor: pointer;
            font-size: 18px;
        }
        .close-x:hover { color: #fff; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="viewport">
            <canvas id="main-canvas" width="960" height="540"></canvas>
        </div>

        <div id="narrative-bar">
            <div id="dialogue-text">正在唤醒瑞金指挥部记忆...</div>
            <button class="pixel-btn" id="next-stage-btn" style="display: none; background-color: #437a43; box-shadow: -3px 0 0 #234723, 3px 0 0 #234723, 0 -3px 0 #234723, 0 3px 0 #234723;">开启长征</button>
        </div>

        <div class="overlay" id="inspect-overlay">
            <div class="pixel-modal">
                <span class="close-x" id="inspect-close">×</span>
                <div class="modal-title" id="inspect-title">物件名称</div>
                <div class="object-preview-slot">
                    <img id="inspect-img" src="" alt="🔍">
                </div>
                <div class="modal-desc" id="inspect-desc">物件详细描述...</div>
            </div>
        </div>

        <div class="overlay" id="paint-overlay">
            <div class="pixel-modal" style="width: 320px;">
                <span class="close-x" id="paint-close">×</span>
                <div class="modal-title">【手绘：煤油灯芯】</div>
                <div class="paint-box">
                    <canvas id="paint-canvas" width="64" height="64"></canvas>
                </div>
                <div class="palette">
                    <div class="color-dot active" style="background-color: #ffcc4d;" data-color="#ffcc4d"></div>
                    <div class="color-dot" style="background-color: #e67e22;" data-color="#e67e22"></div>
                    <div class="color-dot" style="background-color: #ffffff;" data-color="#ffffff"></div>
                </div>
                <div style="display: flex; gap: 15px; width: 100%;">
                    <button class="pixel-btn" id="paint-clear" style="flex:1; background-color:#555; box-shadow:-3px 0 0 #333, 3px 0 0 #333, 0 -3px 0 #333, 0 3px 0 #333;">擦除</button>
                    <button class="pixel-btn" id="paint-submit" style="flex:1;">注入灯芯</button>
                </div>
            </div>
        </div>
    </div>

<script>
    // 更改为英文命名，规避浏览器对中文路径转码导致的 404 错误
    const IMG_LIGHT_PATH = './light.jpg'; 
    const IMG_DARK_PATH  = './dark.jpg'; 

    const HITBOXES = {
        map:       { x: 30,  y: 100, w: 120, h: 120, name: "墙上的军用地图", desc: "地图上画着苏区周围错综复杂的山道。由于煤油灯燃尽，黑夜里大部队的撤退路线已经完全看不清了……" },
        telescope: { x: 460, y: 310, w: 50,  h: 40,  name: "蔡司双筒望远镜", desc: "镜身漆皮有些磨损。通过它，军长曾看清过无数次敌人的前哨碉堡与围剿铁丝网。" },
        stove:     { x: 720, y: 260, w: 160, h: 260, name: "正燃烧的铁皮炉", desc: "炉火正旺，发出微弱的哔啵声。这或许是长征出发前，全指挥部里唯一能提供温度的地方了。" },
        lamp:      { x: 570, y: 300, w: 40,  h: 60,  name: "煤油灯", desc: "灯芯烧秃了，警卫员正焦急地看着你。" }
    };

    const G = {
        zoom: 1, offsetX: 0, offsetY: 0,
        isDragging: false, startX: 0, startY: 0,
        stage: 0, darkAlpha: 0,
        particles: [], isDrawing: false, brushColor: '#ffcc4d'
    };

    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');

    const imgLight = new Image(); imgLight.src = IMG_LIGHT_PATH;
    const imgDark  = new Image(); imgDark.src = IMG_DARK_PATH;

    // 容错机制：无论图片是否成功加载，页面打开 500ms 后强制启动游戏交互
    let gameStarted = false;
    function tryStartGame() {
        if (gameStarted) return;
        gameStarted = true;
        initGame();
    }

    imgLight.onload = () => { if(imgDark.complete) tryStartGame(); };
    imgDark.onload  = () => { if(imgLight.complete) tryStartGame(); };
    setTimeout(tryStartGame, 500); // 兜底防止因为404导致代码死锁

    const dialogueEl = document.getElementById('dialogue-text');
    function triggerDialogue(text) {
        dialogueEl.innerText = "";
        let i = 0;
        function type() {
            if(i < text.length) {
                dialogueEl.innerText += text.charAt(i);
                i++;
                setTimeout(type, 30);
            }
        }
        type();
    }

    function initGame() {
        triggerDialogue("1934年深秋，江西瑞金。你在一间老旧的指挥部里醒来，桌上摊开一张泛黄的军用地图...");
        
        let startTime = Date.now();
        function transitionToDark() {
            let elapsed = Date.now() - startTime;
            G.darkAlpha = Math.min(elapsed / 2500, 1);
            
            if(G.darkAlpha < 1) {
                requestAnimationFrame(transitionToDark);
            } else {
                G.stage = 1; 
                triggerDialogue("年轻的警卫员匆匆走来，把一盏油灯推向你：“同志，灯芯燃尽了……看不清地图，后面的战略转移路线就全错了！” \n【系统提示：使用鼠标滚轮可定点放大场景；请在画面中寻找并点击“煤油灯”】");
            }
        }
        setTimeout(transitionToDark, 2000);
        drawLoop();
    }

    // 1-B 定点滚轮缩放
    viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomFactor = 1.15;
        let nextZoom = G.zoom;
        
        if(e.deltaY < 0) nextZoom *= zoomFactor;
        else nextZoom /= zoomFactor;
        
        nextZoom = Math.max(1, Math.min(4, nextZoom));

        const rect = viewport.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        G.offsetX = mouseX - (mouseX - G.offsetX) * (nextZoom / G.zoom);
        G.offsetY = mouseY - (mouseY - G.offsetY) * (nextZoom / G.zoom);
        G.zoom = nextZoom;

        if(G.zoom === 1) { G.offsetX = 0; G.offsetY = 0; }
        updateCanvasTransform();
    });

    viewport.addEventListener('mousedown', (e) => {
        if (e.target !== viewport && e.target !== canvas) return;
        if (G.zoom === 1) return;
        G.isDragging = true;
        G.startX = e.clientX - G.offsetX;
        G.startY = e.clientY - G.offsetY;
    });

    window.addEventListener('mousemove', (e) => {
        if (!G.isDragging) return;
        G.offsetX = e.clientX - G.startX;
        G.offsetY = e.clientY - G.startY;
        updateCanvasTransform();
    });
    window.addEventListener('mouseup', () => G.isDragging = false);

    function updateCanvasTransform() {
        canvas.style.transform = `translate(${G.offsetX}px, ${G.offsetY}px) scale(${G.zoom})`;
    }

    // 3-A 热区点击碰撞 + 2-B 镜头自动复位
    canvas.addEventListener('click', (e) => {
        if(G.stage !== 1) return; 

        const rect = canvas.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) / G.zoom;
        const clickY = (e.clientY - rect.top) / G.zoom;

        for(let key in HITBOXES) {
            let box = HITBOXES[key];
            if(clickX >= box.x && clickX <= box.x + box.w && clickY >= box.y && clickY <= box.y + box.h) {
                
                // 2-B 自动复位
                G.zoom = 1; G.offsetX = 0; G.offsetY = 0;
                updateCanvasTransform();

                if(key === 'lamp') {
                    document.getElementById('paint-overlay').classList.add('active');
                } else {
                    document.getElementById('inspect-title').innerText = box.name;
                    document.getElementById('inspect-desc').innerText = box.desc;
                    document.getElementById('inspect-img').src = ""; // 预留接口
                    document.getElementById('inspect-overlay').classList.add('active');
                }
                break;
            }
        }
    });

    document.getElementById('inspect-close').addEventListener('click', () => {
        document.getElementById('inspect-overlay').classList.remove('active');
    });

    // 64x64 像素画布
    const pCanvas = document.getElementById('paint-canvas');
    const pCtx = pCanvas.getContext('2d');
    pCtx.fillStyle = '#181824'; pCtx.fillRect(0,0,64,64); 

    pCanvas.addEventListener('mousedown', () => G.isDrawing = true);
    window.addEventListener('mouseup', () => G.isDrawing = false);
    pCanvas.addEventListener('mousemove', (e) => {
        if(!G.isDrawing) return;
        const r = pCanvas.getBoundingClientRect();
        const px = Math.floor((e.clientX - r.left) / r.width * 64);
        const py = Math.floor((e.clientY - r.top) / r.height * 64);
        pCtx.fillStyle = G.brushColor;
        pCtx.fillRect(px, py, 2, 2); 
    });

    document.querySelectorAll('.color-dot').forEach(dot => {
        dot.addEventListener('click', (e) => {
            document.querySelector('.color-dot.active').classList.remove('active');
            e.target.classList.add('active');
            G.brushColor = e.target.dataset.color;
        });
    });
    document.getElementById('paint-clear').addEventListener('click', () => {
        pCtx.fillStyle = '#181824'; pCtx.fillRect(0,0,64,64);
    });
    document.getElementById('paint-close').addEventListener('click', () => {
        document.getElementById('paint-overlay').classList.remove('active');
    });

    // 4-B 高阶动画融合
    document.getElementById('paint-submit').addEventListener('click', () => {
        document.getElementById('paint-overlay').classList.remove('active');
        G.stage = 2; 

        triggerDialogue("随着崭新的灯芯被注入，火光轰然点亮！微弱的像素光芒驱散了漫漫长夜，地图上赫然浮现出了长征的第一步路线：“战略转移·瑞金出发”！");

        let startTime = Date.now();
        function fadeToLight() {
            let elapsed = Date.now() - startTime;
            G.darkAlpha = 1 - Math.min(elapsed / 2500, 1); 
            
            if(G.darkAlpha > 0) {
                requestAnimationFrame(fadeToLight);
            } else {
                G.stage = 3; 
                document.getElementById('next-stage-btn').style.display = 'block';
            }
        }
        fadeToLight();
    });

    function createPixelParticle() {
        if(G.stage >= 2 && Math.random() < 0.2) { 
            G.particles.push({
                x: 588 + (Math.random() * 12 - 6), 
                y: 325,
                size: Math.random() * 3 + 1,
                vx: (Math.random() - 0.5) * 0.5,
                vy: -Math.random() * 0.7 - 0.4,
                alpha: 1,
                color: Math.random() > 0.4 ? '#ffcc4d' : '#e67e22'
            });
        }
    }

    function drawLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 如果图片加载失败，绘制带有复古像素色块的兜底画面，保证依然可玩
        const isLightLoaded = imgLight.complete && imgLight.naturalWidth !== 0;
        const isDarkLoaded = imgDark.complete && imgDark.naturalWidth !== 0;

        if (G.stage === 0 || G.stage === 1) {
            if (isDarkLoaded) {
                ctx.drawImage(imgDark, 0, 0, canvas.width, canvas.height);
            } else {
                // 兜底暗色背景
                ctx.fillStyle = "#181820"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#2d2d38"; ctx.fillRect(570, 300, 40, 60); // 简易油灯热区提示
                ctx.fillStyle = "#fff"; ctx.font = "12px monospace"; ctx.fillText("[图片加载中/请重命名为dark.jpg]", 20, 30);
            }
        } else {
            if (isLightLoaded) {
                ctx.drawImage(imgLight, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#4a3b2c"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            if(G.stage === 2 && isDarkLoaded) {
                ctx.globalAlpha = G.darkAlpha;
                ctx.drawImage(imgDark, 0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1.0;
            }
            
            // 将玩家的手绘融入灯中
            ctx.drawImage(pCanvas, 582, 320, 16, 16);

            // 4-B 动态光晕
            const breathe = Math.sin(Date.now() * 0.005) * 6;
            const gradient = ctx.createRadialGradient(590, 328, 2, 590, 328, 50 + breathe);
            gradient.addColorStop(0, 'rgba(255, 204, 77, 0.5)');
            gradient.addColorStop(0.6, 'rgba(230, 126, 34, 0.15)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 火星粒子
            createPixelParticle();
            for(let i = G.particles.length - 1; i >= 0; i--) {
                let p = G.particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.015;
                if(p.alpha <= 0) { G.particles.splice(i, 1); continue; }
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.floor(p.size), Math.floor(p.size));
            }
            ctx.globalAlpha = 1.0;
        }

        requestAnimationFrame(drawLoop);
    }

    document.getElementById('next-stage-btn').addEventListener('click', () => {
        alert("🎉 序幕通关！下一关卡：【血战湘江·架设像素浮桥】正在解锁中...");
    });
</script>
</body>
</html>

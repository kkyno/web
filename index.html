<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长征绘途 - 三军会师</title>
    <style>
        /* 像素风通用重置 */
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            font-family: 'Courier New', Courier, monospace, sans-serif;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 游戏主容器 */
        #game-container {
            position: relative;
            width: 1024px;
            height: 576px;
            background: url('7.jpg') no-repeat center/cover;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* 通关视频（初时隐藏） */
        #victory-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 5;
        }

        /* 红旗交互热区 */
        #flag-hotspot {
            position: absolute;
            left: 480px; /* 根据视频中红旗台的大致位置微调 */
            top: 320px;
            width: 70px;
            height: 110px;
            cursor: pointer;
            z-index: 2;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        /* 悬停时的淡黄色像素感光圈 */
        #flag-hotspot:hover {
            background-color: rgba(244, 204, 112, 0.2);
            box-shadow: 0 0 0 6px #f4cc70, 0 0 15px #f4cc70;
            outline: 3px dashed #230a0a;
        }

        /* 核心红色像素风 UI 弹窗 */
        #paint-dialog {
            display: none; /* 默认隐藏 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 640px;
            background-color: #4a1c1c;
            border: 6px solid #230a0a;
            box-shadow: inset -4px -4px 0px #311111, inset 4px 4px 0px #632a2a;
            padding: 20px;
            z-index: 10;
        }

        /* 弹窗标题 */
        .dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #f4cc70;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 4px id #230a0a;
            padding-bottom: 5px;
            text-shadow: 2px 2px #000;
        }
        .close-btn {
            cursor: pointer;
            color: #b83232;
            font-size: 24px;
        }
        .close-btn:hover { color: #f4cc70; }

        /* 画布主对齐区域 */
        .canvas-area {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .box-title {
            color: #f4cc70;
            font-size: 12px;
            margin-bottom: 5px;
            text-align: center;
        }
        .canvas-wrapper {
            width: 280px;
            height: 280px;
            background-color: #230a0a;
            border: 4px solid #230a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .canvas-wrapper img, .canvas-wrapper canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* 工具栏：颜色与橡皮擦 */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            background-color: #311111;
            padding: 8px;
            border: 3px solid #230a0a;
        }
        .color-picker {
            width: 32px;
            height: 32px;
            border: 3px solid #230a0a;
            cursor: pointer;
        }
        .color-picker.active {
            border-color: #f4cc70;
            transform: scale(1.1);
        }
        .eraser-btn {
            padding: 4px 12px;
            background-color: #b83232;
            border: 3px solid #230a0a;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .eraser-btn.active {
            background-color: #f4cc70;
            color: #230a0a;
        }

        /* 底部大按钮区 */
        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        .pixel-btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: 4px solid #230a0a;
            cursor: pointer;
            text-shadow: 1px 1px #000;
            box-shadow: inset -3px -3px 0px rgba(0,0,0,0.3);
        }
        .btn-clear {
            background-color: #5c5c5c;
            color: #fff;
        }
        .btn-submit {
            background-color: #b83232;
            color: #f4cc70;
        }
        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* 通关成功大按钮 */
        #victory-btn {
            display: none;
            position: absolute;
            top: 75%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            background-color: #b83232;
            color: #f4cc70;
            font-size: 22px;
            font-weight: bold;
            border: 6px solid #230a0a;
            box-shadow: 0 6px 0px #000, inset -4px -4px 0px rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 20;
            text-shadow: 2px 2px #000;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="flag-hotspot" title="点击绘制红旗"></div>

    <video id="victory-video" src="8cc687a2022a29d59cb554ddb1709df1.mp4" playsinline></video>

    <button id="victory-btn">进入下一关 ➔</button>

    <div id="paint-dialog">
        <div class="dialog-header">
            <span>绘制「作战红旗」</span>
            <span class="close-btn" id="close-dialog">×</span>
        </div>
        
        <div class="canvas-area">
            <div>
                <div class="box-title">历史线索/参考</div>
                <div class="canvas-wrapper">
                    <img src="06_红旗.png" alt="参考红旗">
                </div>
            </div>
            <div>
                <div class="box-title">手绘交互层 (平滑画笔)</div>
                <div class="canvas-wrapper">
                    <canvas id="paint-canvas" width="280" height="280"></canvas>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="color-picker active" style="background-color: #b83232;" data-color="#b83232"></div> <div class="color-picker" style="background-color: #f4cc70;" data-color="#f4cc70"></div> <div class="color-picker" style="background-color: #5a3825;" data-color="#5a3825"></div> <div class="color-picker" style="background-color: #2d4538;" data-color="#2d4538"></div> <div class="color-picker" style="background-color: #334455;" data-color="#334455"></div> <div class="color-picker" style="background-color: #ffffff;" data-color="#ffffff"></div> <button class="eraser-btn" id="eraser">橡皮擦</button>
        </div>

        <div class="btn-group">
            <button class="pixel-btn btn-clear" id="clear-canvas">擦除重画</button>
            <button class="pixel-btn btn-submit" id="submit-canvas">注入场景</button>
        </div>
    </div>
</div>

<script>
    // DOM 元素获取
    const hotspot = document.getElementById('flag-hotspot');
    const dialog = document.getElementById('paint-dialog');
    const closeDialog = document.getElementById('close-dialog');
    const canvas = document.getElementById('paint-canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('victory-video');
    const victoryBtn = document.getElementById('victory-btn');
    
    const clearBtn = document.getElementById('clear-canvas');
    const submitBtn = document.getElementById('submit-canvas');
    const eraserBtn = document.getElementById('eraser');
    const colorPickers = document.querySelectorAll('.color-picker');

    // 绘画状态变量
    let isPainting = false;
    let currentColor = '#b83232';
    let isEraser = false;
    let brushSize = 8;

    // 初始化画布背景（透明）
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // 1. 弹窗打开与关闭
    hotspot.addEventListener('click', () => {
        dialog.style.display = 'block';
    });
    closeDialog.addEventListener('click', () => {
        dialog.style.display = 'none';
    });

    // 2. 调色盘与工具切换
    colorPickers.forEach(picker => {
        picker.addEventListener('click', (e) => {
            isEraser = false;
            eraserBtn.classList.remove('active');
            colorPickers.forEach(p => p.classList.remove('active'));
            
            e.target.classList.add('active');
            currentColor = e.target.getAttribute('data-color');
        });
    });

    eraserBtn.addEventListener('click', () => {
        isEraser = true;
        colorPickers.forEach(p => p.classList.remove('active'));
        eraserBtn.classList.add('active');
    });

    // 3. 鼠标手绘逻辑
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }

    canvas.addEventListener('mousedown', (e) => {
        isPainting = true;
        const pos = getMousePos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isPainting) return;
        const pos = getMousePos(e);
        
        if (isEraser) {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 16; 
        } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = brushSize;
        }
        
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    });

    window.addEventListener('mouseup', () => {
        isPainting = false;
    });

    // 清空画布
    clearBtn.addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // 4. 几何形状判定算法（松散检测）
    function checkGeometry() {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        
        let leftQuadrantPixels = 0;  // 左半边（对应参考图旗杆长方形区域）
        let rightQuadrantPixels = 0; // 右上边（对应参考图旗面三角形/长方形区域）
        let totalPainted = 0;

        // 遍历画布像素点
        for (let y = 0; y < canvas.height; y++) {
            for (let x = 0; x < canvas.width; x++) {
                const idx = (y * canvas.width + x) * 4;
                const alpha = imgData[idx + 3]; // 获取透明度通道

                if (alpha > 50) { // 如果该点被上色了
                    totalPainted++;
                    if (x < canvas.width * 0.35) {
                        leftQuadrantPixels++; // 判定为立柱长条区域
                    }
                    if (x >= canvas.width * 0.35 && y < canvas.height * 0.65) {
                        rightQuadrantPixels++; // 判定为右上彩旗区域
                    }
                }
            }
        }

        // 简易阈值判定：总涂抹面积不能太少，且两边都有落笔（证明既画了杆，又画了面）
        if (totalPainted > 800 && leftQuadrantPixels > 150 && rightQuadrantPixels > 400) {
            return true;
        }
        return false;
    }

    // 5. 注入场景（通关逻辑）
    submitBtn.addEventListener('click', () => {
        if (checkGeometry()) {
            // 判定通过
            dialog.style.display = 'none';
            hotspot.style.display = 'none'; // 隐藏热区
            
            // 播放视频
            video.style.display = 'block';
            video.play();
        } else {
            // 判定失败提示
            alert("高台之上的红旗还不够完整，请参考左侧图像，画出挺拔的旗杆与飘扬的旗面吧！");
        }
    });

    // 6. 视频播放完毕停留在最后一帧，并弹出通关按钮
    video.addEventListener('ended', () => {
        video.pause(); // 停在最后一帧
        victoryBtn.style.display = 'block'; // 弹出像素风格成功按钮
    });

    // 点击通关成功按钮的后续交互
    victoryBtn.addEventListener('click', () => {
        alert("长征胜利宣告圆满落幕！即将进入下一关卡...");
        // 这里可以执行切换关卡、跳转页面或重置游戏的逻辑
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>长征星路 | The Long March</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    overflow-x: hidden;
    overflow-y: auto;
    background: #050507;
    color: #f0f0f0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    cursor: none;
    scroll-behavior: smooth;
  }
  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    z-index: 1;
    pointer-events: auto;
  }
  .custom-cursor {
    position: fixed;
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.05s ease;
    mix-blend-mode: difference;
  }
  .cursor-trail {
    position: fixed;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: all 0.15s ease;
  }
  .scene-text {
    position: relative;
    z-index: 10;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 2rem;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .scene-text.active {
    opacity: 1;
  }
  .scene-text h2 {
    font-size: clamp(1.4rem, 4vw, 3rem);
    margin-bottom: 1rem;
    font-weight: 300;
    letter-spacing: 2px;
  }
  .scene-text p {
    font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    max-width: 800px;
    line-height: 1.8;
    opacity: 0.85;
    font-weight: 200;
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div class="custom-cursor" id="cursor"></div>
<div class="cursor-trail" id="trail"></div>

<div class="scene-text" id="text1">
  <h2>长征星路 · 启程</h2>
  <p>1934年，星火集结，信仰为灯，踏上万里征程。</p>
</div>
<div class="scene-text" id="text2">
  <h2>浴血前行</h2>
  <p>山河为证，岁月为名，每一步都是不屈的脊梁。</p>
</div>
<div class="scene-text" id="text3">
  <h2>信仰如磐</h2>
  <p>穿越黑暗，穿越风雪，心中光芒永不熄灭。</p>
</div>
<div class="scene-text" id="text4">
  <h2>万里会师</h2>
  <p>山河无恙，英雄不朽，长征精神永照千秋。</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ——————————————————————————————
// 基础配置
// ——————————————————————————————
const canvas = document.getElementById('scene');
const cursor = document.getElementById('cursor');
const trail = document.getElementById('trail');
let scene, camera, renderer, controls;
let monolith; // 中心长方体（纪念碑）
let particles = [];
let particleCount = window.innerWidth < 768 ? 600 : 1500;
let mouse = new THREE.Vector2();
let mouseDown = false;
let scrollScene = 0;
const totalScenes = 4;

// ——————————————————————————————
// 初始化3D场景
// ——————————————————————————————
function init() {
  // 渲染器
  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    alpha: true
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

  // 场景
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x050507, 10, 60);

  // 相机
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 3, 12);

  // 光照
  const ambient = new THREE.AmbientLight(0xffffff, 0.3);
  const keyLight = new THREE.DirectionalLight(0xff4444, 1.2);
  const fillLight = new THREE.DirectionalLight(0x4488ff, 0.7);
  keyLight.position.set(5, 10, 5);
  fillLight.position.set(-5, 5, -5);
  scene.add(ambient, keyLight, fillLight);

  // 中心长方体（纪念碑）
  const geo = new THREE.BoxGeometry(2, 8, 2);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x1a1a2a,
    metalness: 0.9,
    roughness: 0.2
  });
  monolith = new THREE.Mesh(geo, mat);
  monolith.position.y = 0;
  scene.add(monolith);

  // 粒子系统
  createParticles();

  // 控制器（支持鼠标/触屏）
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enableZoom = true;
  controls.minDistance = 5;
  controls.maxDistance = 30;
  controls.enablePan = false;
  controls.autoRotate = false;

  // 事件
  window.addEventListener('resize', onResize);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mousedown', () => mouseDown = true);
  window.addEventListener('mouseup', () => mouseDown = false);
  window.addEventListener('touchstart', () => mouseDown = true);
  window.addEventListener('touchend', () => mouseDown = false);
  window.addEventListener('scroll', onScroll);

  // 光标
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX - 5 + 'px';
    cursor.style.top = e.clientY - 5 + 'px';
    setTimeout(() => {
      trail.style.left = e.clientX - 3 + 'px';
      trail.style.top = e.clientY - 3 + 'px';
    }, 50);
  });

  animate();
  updateSceneText();
}

// ——————————————————————————————
// 粒子创建
// ——————————————————————————————
function createParticles() {
  const pGeo = new THREE.BufferGeometry();
  const pMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.18,
    transparent: true,
    opacity: 0.85,
    sizeAttenuation: true
  });

  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount * 3; i += 3) {
    positions[i] = (Math.random() - 0.5) * 60;
    positions[i + 1] = (Math.random() - 0.5) * 30;
    positions[i + 2] = (Math.random() - 0.5) * 60;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const points = new THREE.Points(pGeo, pMat);
  scene.add(points);
  particles = points;
}

// ——————————————————————————————
// 粒子物理运动
// ——————————————————————————————
function updateParticles() {
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < pos.length; i += 3) {
    const x = pos[i];
    const y = pos[i + 1];
    const z = pos[i + 2];

    // 重力
    pos[i + 1] -= 0.005;

    // 风力
    pos[i] += Math.sin(Date.now() * 0.001 + i) * 0.01;
    pos[i + 2] += Math.cos(Date.now() * 0.001 + i) * 0.01;

    // 鼠标吸引
    if (mouseDown) {
      pos[i] += (0 - x) * 0.02;
      pos[i + 1] += (0 - y) * 0.02;
      pos[i + 2] += (0 - z) * 0.02;
    }

    // 边界重置
    if (Math.abs(y) > 20) pos[i + 1] = 10;
    if (Math.abs(x) > 40) pos[i] = (Math.random() - 0.5) * 20;
    if (Math.abs(z) > 40) pos[i + 2] = (Math.random() - 0.5) * 20;
  }
  particles.geometry.attributes.position.needsUpdate = true;
}

// ——————————————————————————————
// 滚动切换场景
// ——————————————————————————————
function onScroll() {
  const h = window.innerHeight;
  const top = window.scrollY;
  scrollScene = Math.floor(top / h);
  if (scrollScene >= totalScenes) {
    scrollScene = 0;
    window.scrollTo(0, 0);
  }
  updateSceneText();
}

function updateSceneText() {
  document.querySelectorAll('.scene-text').forEach((el, i) => {
    el.classList.toggle('active', i === scrollScene);
  });
}

// ——————————————————————————————
// 动画循环
// ——————————————————————————————
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateParticles();

  // 场景切换淡入淡出
  scene.background = new THREE.Color(0x050507 + scrollScene * 0x010102);

  // 长方体轻微呼吸
  monolith.scale.y = 1 + Math.sin(Date.now() * 0.0008) * 0.03;

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
}

// 启动
init();
</script>
</body>
</html>

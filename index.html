<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>长征·星途回忆录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background: #0c0c1a;
            font-family: "Microsoft YaHei", sans-serif;
            color: #fff;
        }
        canvas { display: block; }
        /* 信息弹窗 */
        .info-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,20,40,0.85);
            border: 1px solid #ffd700;
            padding: 20px;
            max-width: 400px;
            display: none;
            z-index: 10;
            border-radius: 8px;
        }
        .info-popup h3 { color: #ffd700; margin-bottom: 10px; }
        /* 回忆页 */
        #memoryPage {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0b1020;
            z-index: 20;
            display: none;
            overflow-y: auto;
            padding: 50px;
        }
        .memory-item {
            margin: 80px auto;
            max-width: 600px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #ffd70055;
            padding: 30px;
            border-radius: 12px;
        }
        .memory-item h2 { color: #ffd700; margin-bottom: 15px; }
        .interactive-obj {
            width: 80px; height: 80px;
            margin: 20px auto;
            background: #fff2;
            border-radius: 8px;
            display: flex;
            align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .interactive-obj:hover { background: #fff4; transform: scale(1.05); }
    </style>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
</head>
<body>
    <!-- 3D 场景容器 -->
    <div id="container"></div>

    <!-- 信息弹窗 -->
    <div class="info-popup" id="infoPopup">
        <h3 id="popupTitle">场景标题</h3>
        <p id="popupText">场景描述内容</p>
    </div>

    <!-- 回忆页 -->
    <div id="memoryPage">
        <div class="memory-item">
            <h2>瑞金出发 · 1934</h2>
            <div class="interactive-obj" onclick="alert('八角帽：初心与使命')">八角帽</div>
            <p>红军告别苏区，踏上二万五千里的漫漫征途。</p>
        </div>
        <div class="memory-item">
            <h2>遵义会议 · 转折</h2>
            <div class="interactive-obj" onclick="alert('油灯：黑暗中的光芒')">油灯</div>
            <p>确立正确领导，中国革命迎来生死攸关的转折点。</p>
        </div>
        <div class="memory-item">
            <h2>飞夺泸定桥 · 无畏</h2>
            <div class="interactive-obj" onclick="alert('铁索：勇士的足迹')">铁索</div>
            <p>22勇士攀铁链冲锋，突破天险。</p>
        </div>
        <div class="memory-item">
            <h2>雪山草地 · 坚韧</h2>
            <div class="interactive-obj" onclick="alert('草鞋：踏遍千山万水')">草鞋</div>
            <p>饥寒交迫，信仰不灭，一步步走出绝境。</p>
        </div>
        <div class="memory-item">
            <h2>胜利会师 · 1936</h2>
            <div class="interactive-obj" onclick="alert('红星：信仰永恒')">红星</div>
            <p>三大主力会师，长征胜利结束，精神永垂不朽。</p>
            <button style="margin-top:30px;padding:10px 20px;background:#ffd700;color:#000;border:none;border-radius:6px;" onclick="closeMemoryPage()">返回星途</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let stars = [], pathStars = [], highlightStars = [];
        let endStar;
        let scrollY = 0;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let infoPopup = document.getElementById('infoPopup');
        let isMemoryOpen = false;

        // 长按变量
        let pressTimer = null;
        let pressTime = 800; // 长按800ms触发

        init();
        animate();

        function init() {
            // 场景
            scene = new THREE.Scene();

            // 相机
            camera = new THREE.PerspectiveCamera(
                75, window.innerWidth / window.innerHeight, 0.1, 200
            );
            camera.position.set(0, 30, 50);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            // 控制器（仅调试可用，可注释）
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 光照
            let light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 50, 50);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 0.6));

            // 创建星空（初始盘旋）
            createSkyStars();

            // 创建路径星星（后面滚动会动）
            createPathStars();

            // 创建尽头大五角星
            createEndStar();

            // 监听
            window.addEventListener('scroll', onScroll);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', onMouseUp);
            window.addEventListener('resize', onResize);
        }

        // 1. 初始满天星
        function createSkyStars() {
            for (let i = 0; i < 800; i++) {
                let geo = new THREE.SphereGeometry(0.15, 8, 8);
                let mat = new THREE.MeshBasicMaterial({
                    color: 0xffffff, transparent: true, opacity: 0.7
                });
                let star = new THREE.Mesh(geo, mat);
                star.position.set(
                    (Math.random()-0.5)*100,
                    Math.random()*60+10,
                    (Math.random()-0.5)*100
                );
                star.userData.isSkyStar = true;
                scene.add(star);
                stars.push(star);
            }
        }

        // 2. 星路 + 两侧高亮交互星星
        function createPathStars() {
            // 路径主体
            for (let i = 0; i < 200; i++) {
                let geo = new THREE.SphereGeometry(0.2, 8, 8);
                let mat = new THREE.MeshBasicMaterial({
                    color: 0xffd700, transparent: true, opacity: 0.8
                });
                let star = new THREE.Mesh(geo, mat);
                star.position.set(
                    (Math.random()-0.5)*15,
                    0,
                    -i * 1.2
                );
                star.userData.isPathStar = true;
                star.userData.baseZ = -i * 1.2;
                scene.add(star);
                pathStars.push(star);
            }

            // 两侧高亮交互星星（带内容）
            let eventData = [
                { x: 12, z: -20, title: "瑞金出发", text: "1934年10月，中央红军开始长征。" },
                { x: -12, z: -40, title: "血战湘江", text: "突破四道封锁线，损失惨重。" },
                { x: 12, z: -60, title: "遵义会议", text: "确立毛泽东领导，生死转折。" },
                { x: -12, z: -80, title: "飞夺泸定桥", text: "22勇士攀铁索冲锋。" },
                { x: 12, z: -100, title: "翻雪山", text: "严寒缺氧，战士们相互搀扶前进。" },
                { x: -12, z: -120, title: "过草地", text: "沼泽遍布，饥饿与死亡相伴。" },
                { x: 12, z: -140, title: "胜利会师", text: "1936年10月，三大主力会师甘肃会宁。" }
            ];

            eventData.forEach(d => {
                let geo = new THREE.SphereGeometry(0.4, 8, 8);
                let mat = new THREE.MeshBasicMaterial({
                    color: 0xffaa00, transparent: true, opacity: 1
                });
                let star = new THREE.Mesh(geo, mat);
                star.position.set(d.x, 1, d.z);
                star.userData = {
                    isHighlight: true,
                    title: d.title,
                    text: d.text
                };
                scene.add(star);
                highlightStars.push(star);
            });
        }

        // 3. 尽头大五角星
        function createEndStar() {
            let geo = new THREE.OctahedronGeometry(2.5, 0);
            let mat = new THREE.MeshBasicMaterial({
                color: 0xffd700, transparent: true, opacity: 0.9
            });
            endStar = new THREE.Mesh(geo, mat);
            endStar.position.set(0, 2, -180);
            endStar.userData.isEndStar = true;
            scene.add(endStar);
        }

        // 滚动 → 相机下移 + 星路展开
        function onScroll(e) {
            if (isMemoryOpen) return;
            scrollY = window.scrollY;
            // 相机跟着往前
            camera.position.z = 50 - scrollY * 0.3;
            camera.position.y = 30 - scrollY * 0.1;
        }

        // 鼠标移动 → 射线检测高亮星星
        function onMouseMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            let intersects = raycaster.intersectObjects(highlightStars);

            if (intersects.length > 0) {
                let obj = intersects[0].object;
                obj.material.color.set(0xffffff);
                obj.scale.set(1.3, 1.3, 1.3);
                // 显示弹窗
                infoPopup.style.display = 'block';
                document.getElementById('popupTitle').innerText = obj.userData.title;
                document.getElementById('popupText').innerText = obj.userData.text;
            } else {
                highlightStars.forEach(star => {
                    star.material.color.set(0xffaa00);
                    star.scale.set(1,1,1);
                });
                infoPopup.style.display = 'none';
            }

            // 检测尽头星星
            let endIntersect = raycaster.intersectObject(endStar);
            if (endIntersect.length > 0) {
                endStar.material.color.set(0xffffff);
            } else {
                endStar.material.color.set(0xffd700);
            }
        }

        // 鼠标按下 → 长按检测
        function onMouseDown(e) {
            raycaster.setFromCamera(mouse, camera);
            let intersects = raycaster.intersectObject(endStar);
            if (intersects.length > 0) {
                pressTimer = setTimeout(() => {
                    openMemoryPage();
                }, pressTime);
            }
        }

        function onMouseUp() {
            clearTimeout(pressTimer);
        }

        function openMemoryPage() {
            isMemoryOpen = true;
            document.getElementById('memoryPage').style.display = 'block';
        }

        function closeMemoryPage() {
            isMemoryOpen = false;
            document.getElementById('memoryPage').style.display = 'none';
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // 星空缓慢旋转
            stars.forEach(star => {
                star.rotation.y += 0.001;
            });

            // 尽头星星缓慢转动
            endStar.rotation.y += 0.005;
            endStar.rotation.x += 0.002;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
